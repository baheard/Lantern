<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Auditorium blockout</title>
<style>
  html,body{margin:0;padding:0;background:#888;overflow:hidden;font-family:system-ui,sans-serif}
  #c{display:block}
  #hint{position:fixed;left:10px;bottom:8px;color:#222;background:rgba(255,255,255,.6);
        padding:4px 8px;border-radius:4px;font-size:12px;pointer-events:none}
</style>
</head>
<body>
<canvas id="c" width="768" height="1024"></canvas>
<div id="hint"><b>right-drag</b> = look around · <b>W/A/S/D</b> = move · <b>Q/E</b> = down/up · <b>Shift</b> = faster · <b>scroll</b> = forward/back · panel (top-right) edits geometry</div>
<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://unpkg.com/lil-gui@0.19/dist/lil-gui.umd.min.js"></script>
<script>
// ---------------------------------------------------------------------------
// Rough clay blockout of the Theatre "Auditorium" volume (location-framing.md).
// Frame: +X = east, +Z = SOUTH, +Y = up. North (stage) end at -Z.
// ?view= picks a room camera; ?lock=1 = fixed 3:4 canvas for the screenshot driver
// (no orbit, no GUI). Otherwise: free orbit + a lil-gui panel to edit the geometry.
// PARAMS holds every tweakable dimension; build() rebuilds the world group on change.
// ---------------------------------------------------------------------------
const params = new URLSearchParams(location.search);
const view = params.get('view') || 'stage';
const locked = params.get('lock') === '1';

const PARAMS = {
  pitDepth: 1.8, pitWidth: 8, pitLen: 2.6,
  stageHeight: 1.6, stageDepth: 6,
  seatRows: 14, seatRake: 0.06,
  chandelierY: 7.4,
  fov: 48,
  lightKey: 0.45, lightHemi: 0.7, lightAmb: 0.4, exposure: 1.0,
};

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x9a9a9a);
scene.fog = new THREE.Fog(0x9a9a9a, 30, 70);

const W = 768, H = 1024;
const camera = new THREE.PerspectiveCamera(PARAMS.fov, W / H, 0.1, 500);

const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true, preserveDrawingBuffer: true });
renderer.setSize(W, H, false);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = PARAMS.exposure;

const clay = (shade = 0xb0b0b0) => new THREE.MeshStandardMaterial({ color: shade, roughness: 0.96, metalness: 0 });

// --- world group: cleared + rebuilt whenever a PARAM changes -----------------
let world = new THREE.Group();
scene.add(world);
function box(w, h, d, x, y, z, mat) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat || clay());
  m.position.set(x, y, z); m.castShadow = true; m.receiveShadow = true; world.add(m); return m;
}

function build() {
  scene.remove(world);
  world.traverse((o) => { if (o.geometry) o.geometry.dispose(); });
  world = new THREE.Group();
  scene.add(world);

  const P = PARAMS;
  const pitX = P.pitWidth / 2;       // pit spans x [-pitX, pitX]
  const stageLipZ = -9;              // south face of the stage
  const pitZ0 = stageLipZ, pitZ1 = stageLipZ + P.pitLen; // pit hole z range

  // --- hall shell -----------------------------------------------------------
  box(0.4, 11, 30, -10, 5, 0, clay(0xa6a6a6));   // west wall
  box(0.4, 11, 30, 10, 5, 0, clay(0xa6a6a6));    // east wall
  box(20, 0.4, 30, 0, 10.5, 0, clay(0xc2c2c2));  // sculptured plaster ceiling
  box(20, 11, 0.4, 0, 5, 15, clay(0xa0a0a0));    // rear (south) wall

  // --- floor with the pit cut OUT (four pieces around a rectangular hole) ----
  const fMat = clay(0x9c9c9c);
  box(10 - pitX, 0.2, 24, -(pitX + (10 - pitX) / 2), -0.1, 3, fMat);  // west strip
  box(10 - pitX, 0.2, 24, (pitX + (10 - pitX) / 2), -0.1, 3, fMat);   // east strip
  box(P.pitWidth, 0.2, 15 - pitZ1, 0, -0.1, (pitZ1 + 15) / 2, fMat);  // centre strip behind pit

  // --- stage: raised wooden platform at the north end -----------------------
  box(16, P.stageHeight, P.stageDepth, 0, P.stageHeight / 2, stageLipZ - P.stageDepth / 2, clay(0xbfb39a));
  box(16, 4.5, 0.4, 0, 8, stageLipZ - P.stageDepth - 0.2, clay(0x9a9a9a)); // back-of-stage wall
  box(16, 5, 0.5, 0, 7, stageLipZ - 0.3, clay(0x8f7f7f));                  // proscenium curtain above lip

  // --- orchestra pit: genuine sunken depression in front of the stage lip ----
  const pMat = clay(0x8a8a8a);
  box(P.pitWidth, 0.2, P.pitLen, 0, -P.pitDepth, (pitZ0 + pitZ1) / 2, pMat);             // pit floor (below house)
  box(0.3, P.pitDepth, P.pitLen, -pitX, -P.pitDepth / 2, (pitZ0 + pitZ1) / 2, pMat);     // pit west wall
  box(0.3, P.pitDepth, P.pitLen, pitX, -P.pitDepth / 2, (pitZ0 + pitZ1) / 2, pMat);      // pit east wall
  box(P.pitWidth, P.pitDepth, 0.3, 0, -P.pitDepth / 2, pitZ1, pMat);                     // pit south (house-side) wall
  box(P.pitWidth, 0.4, 0.3, 0, -0.0, pitZ1, clay(0x959595));                             // low rail at the house-floor rim

  // --- raked seating: rows that rise toward the rear, two N-S aisles ---------
  const seatMat = clay(0xa8a8a8);
  function seatBlock(x0, x1) {
    let row = 0;
    for (let z = pitZ1 + 1.2; z <= 13; z += 1.4, row++) {
      const yLift = row * P.seatRake;
      for (let x = x0; x <= x1; x += 1.15) {
        box(0.85, 0.45, 0.75, x, 0.22 + yLift, z, seatMat);          // seat pan
        // rounded seat back (cylinder) so the silhouette reads soft, not blocky
        const back = new THREE.Mesh(new THREE.CylinderGeometry(0.42, 0.42, 0.85, 12, 1, false, 0, Math.PI), seatMat);
        back.rotation.z = Math.PI / 2; back.rotation.y = Math.PI;
        back.position.set(x, 0.55 + yLift, z + 0.38); back.castShadow = true; back.receiveShadow = true; world.add(back);
      }
    }
  }
  seatBlock(-8.6, -5.3);   // west side block
  seatBlock(-2.9, 2.9);    // centre block
  seatBlock(5.3, 8.6);     // east side block

  // --- balcony boxes on the raised side walls -------------------------------
  function balcony(side) {
    for (let z = -6; z <= 9; z += 5) {
      box(2.6, 2.4, 3.4, side * 8.3, 5.2, z, clay(0xb4b4b4));   // box platform
      box(2.6, 0.7, 0.3, side * 7.0, 4.3, z, clay(0x9c9c9c));   // parapet
    }
  }
  balcony(1); balcony(-1);

  // --- rear double-doors flush ON the south wall, at the aisle ends ----------
  box(2.2, 4, 0.25, 4, 2, 14.78, clay(0x6f6760));
  box(2.2, 4, 0.25, -4, 2, 14.78, clay(0x6f6760));

  // --- chandelier: crystal cluster high over the centre (RAISED) ------------
  const chand = new THREE.Mesh(new THREE.IcosahedronGeometry(1.5, 1), clay(0xdad7cf));
  chand.position.set(0, P.chandelierY, 0); chand.castShadow = true; world.add(chand);
  box(0.15, 10.5 - P.chandelierY, 0.15, 0, (P.chandelierY + 10.5) / 2, 0, clay(0xcccccc));
}

// --- lighting: soft, reveals depth, recesses stay darker; no blow-out -------
const hemi = new THREE.HemisphereLight(0xffffff, 0x404040, PARAMS.lightHemi);
scene.add(hemi);
const key = new THREE.DirectionalLight(0xffffff, PARAMS.lightKey);
key.position.set(7, 16, 9); key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.left = -26; key.shadow.camera.right = 26;
key.shadow.camera.top = 26; key.shadow.camera.bottom = -26;
key.shadow.camera.near = 1; key.shadow.camera.far = 90;
key.shadow.bias = -0.0006;
scene.add(key);
const fill = new THREE.DirectionalLight(0xffffff, 0.18);
fill.position.set(-8, 6, 10); scene.add(fill);
const amb = new THREE.AmbientLight(0xffffff, PARAMS.lightAmb);
scene.add(amb);

// --- cameras: one per Auditorium member, per mold's recorded vantage --------
// fov can differ per view (the aisle wants a touch tighter to fill with stage).
const VIEWS = {
  stage:                  { pos: [0, 3.2, -12.5], look: [0, 1.0, 7],  fov: 50 },
  'eastern-theatre-aisle':{ pos: [2.6, 3.0, 8],   look: [0.4, 0.4, -9], fov: 54 },
  'western-theatre-aisle':{ pos: [-2.6, 3.0, 8],  look: [-0.4, 0.4, -9], fov: 54 },
  'eastern-balcony':      { pos: [8.0, 5.6, -1],  look: [-3, 0.3, -8], fov: 52 },
  'western-balcony':      { pos: [-8.0, 5.6, -1], look: [3, 0.3, -8], fov: 52 },
  // diagnostic: oblique close look at the stage lip + sunken pit + house floor
  'pit-check':            { pos: [7, 3.5, -3], look: [-1, -1, -9], fov: 55 },
};
const v = VIEWS[view] || VIEWS.stage;
PARAMS.fov = v.fov || PARAMS.fov;
function applyCamera() {
  camera.position.set(...v.pos);
  camera.fov = PARAMS.fov; camera.updateProjectionMatrix();
  camera.lookAt(...v.look);
}

build();
applyCamera();

// --- interactivity: orbit + lil-gui (skipped when ?lock=1) ------------------
let controls = null;
if (!locked) {
  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.target.set(...v.look); controls.update();

  renderer.domElement.style.width = '100vw';
  renderer.domElement.style.height = '100vh';
  const resize = () => {
    const w = window.innerWidth, h = window.innerHeight;
    renderer.setSize(w, h, false);
    camera.aspect = w / h; camera.updateProjectionMatrix();
  };
  window.addEventListener('resize', resize); resize();

  // --- WASD fly-through: move the camera (and orbit target) through the hall.
  // Drag still looks around (orbit); WASD walks. Q/E = down/up, Shift = faster.
  const pressed = {};
  window.addEventListener('keydown', (e) => { pressed[e.code] = true; });
  window.addEventListener('keyup', (e) => { pressed[e.code] = false; });
  window.__move = () => {
    const fwd = new THREE.Vector3(); camera.getWorldDirection(fwd); fwd.normalize();
    const right = new THREE.Vector3().crossVectors(fwd, camera.up).normalize();
    const m = new THREE.Vector3();
    if (pressed.KeyW) m.add(fwd);
    if (pressed.KeyS) m.addScaledVector(fwd, -1);
    if (pressed.KeyD) m.add(right);
    if (pressed.KeyA) m.addScaledVector(right, -1);
    if (pressed.KeyE) m.y += 1;
    if (pressed.KeyQ) m.y -= 1;
    if (m.lengthSq() > 0) {
      const speed = (pressed.ShiftLeft || pressed.ShiftRight) ? 0.55 : 0.2;
      m.normalize().multiplyScalar(speed);
      camera.position.add(m); controls.target.add(m);
    }
  };

  if (window.lil && lil.GUI) {
    const gui = new lil.GUI({ title: 'Auditorium blockout' });
    const g1 = gui.addFolder('Orchestra pit');
    g1.add(PARAMS, 'pitDepth', 0.5, 4, 0.1).onChange(build);
    g1.add(PARAMS, 'pitWidth', 3, 14, 0.5).onChange(build);
    g1.add(PARAMS, 'pitLen', 1, 6, 0.2).onChange(build);
    const g2 = gui.addFolder('Stage & seats');
    g2.add(PARAMS, 'stageHeight', 0.5, 3, 0.1).onChange(build);
    g2.add(PARAMS, 'stageDepth', 3, 10, 0.5).onChange(build);
    g2.add(PARAMS, 'seatRake', 0, 0.2, 0.01).onChange(build);
    g2.add(PARAMS, 'chandelierY', 5, 10, 0.1).onChange(build);
    const g3 = gui.addFolder('Camera & light');
    g3.add(PARAMS, 'fov', 25, 80, 1).onChange(() => { camera.fov = PARAMS.fov; camera.updateProjectionMatrix(); });
    g3.add(PARAMS, 'lightKey', 0, 1.5, 0.05).onChange(() => key.intensity = PARAMS.lightKey);
    g3.add(PARAMS, 'lightHemi', 0, 1.5, 0.05).onChange(() => hemi.intensity = PARAMS.lightHemi);
    g3.add(PARAMS, 'lightAmb', 0, 1.5, 0.05).onChange(() => amb.intensity = PARAMS.lightAmb);
    g3.add(PARAMS, 'exposure', 0.3, 2, 0.05).onChange(() => renderer.toneMappingExposure = PARAMS.exposure);
    gui.add({ logCamera: () => console.log('pos', camera.position, 'target', controls.target) }, 'logCamera').name('log camera to console');
  }
}

function loop() {
  requestAnimationFrame(loop);
  if (window.__move) window.__move();
  if (controls) controls.update();
  renderer.render(scene, camera);
}
renderer.render(scene, camera);
if (!locked) loop();
window.__ready = true;
</script>
</body>
</html>
