<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Blockout renderer</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#23202a;color:#e8e4ee;font:13px system-ui,sans-serif;overflow:hidden}
  textarea{max-width:100%}
  #bar{position:fixed;top:0;left:0;right:0;min-height:42px;display:flex;align-items:center;gap:6px;padding:5px 10px;background:#17151d;border-bottom:1px solid #2a2536;z-index:5;flex-wrap:wrap}
  #bar .spacer{flex:1}
  #bar button,#bar select{font:12px system-ui;padding:4px 8px;border:1px solid #4a4458;border-radius:5px;background:#241f30;color:#e8e4ee;cursor:pointer}
  #bar button:disabled{opacity:.5;cursor:default}
  #views button{margin-right:3px;background:#1f1b2c}
  #views button.on{background:#3a3450;color:#fff;border-color:#6a5}
  #gen{border-color:#c4a35a!important;color:#f0d9a0!important;font-weight:600}
  #upd{background:#3a6ea5!important;border-color:#5a8ec5!important;color:#fff!important;font-weight:600}
  #upd:hover{background:#4a7eb5!important}
  #msg{color:#bdb4c8;font-size:12px;margin-left:4px}
  #cols{position:absolute;top:48px;left:0;right:0;bottom:0;display:flex;gap:10px;padding:10px}
  #colView{flex:0 0 auto;height:100%}
  #viewport{height:100%;aspect-ratio:3/4;background:#888;border-radius:8px;overflow:hidden}
  #viewport canvas{width:100%;height:100%;display:block}
  #colResult{flex:1 1 0;min-width:0;display:flex;flex-direction:column;gap:8px}
  #result{position:relative;flex:1;min-height:0;background:#17151d;border:1px solid #2a2536;border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden}
  #result img{max-width:100%;max-height:100%;object-fit:contain}
  #resultCap{position:absolute;top:0;left:0;right:0;padding:6px 10px;font-size:13px;font-weight:600;
       color:#f0e6d0;background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,0));border-radius:8px 8px 0 0;pointer-events:none;z-index:2}
  #result .ph{color:#6a6478;text-align:center;padding:24px;line-height:1.6}
  #gallery{flex:0 0 auto;height:104px;display:flex;gap:6px;overflow-x:auto;overflow-y:hidden;padding:2px}
  #gallery .thumb{flex:0 0 auto;height:96px;border:2px solid transparent;border-radius:5px;cursor:pointer;position:relative;background:#000}
  #gallery .thumb.on{border-color:#c4a35a}
  #gallery .thumb img{height:100%;display:block;border-radius:3px}
  #gallery .thumb .cap{position:absolute;left:0;right:0;bottom:0;font-size:9px;background:rgba(0,0,0,.6);color:#ddd;padding:1px 3px;border-radius:0 0 3px 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #gallery .none{color:#6a6478;align-self:center;padding:0 10px}
  #colText{flex:0 0 420px;display:flex;flex-direction:column;gap:10px;min-height:0}
  #colText .panel{background:#17151d;border:1px solid #2a2536;border-radius:8px;padding:10px 12px}
  #desc{flex:0 0 auto;max-height:32%;overflow:auto}
  #desc h3{margin:0 0 5px;font-size:17px;color:#f0d9a0}
  #desc .prose{color:#d2ccde;font-size:15px;line-height:1.55;white-space:pre-wrap}
  #colText label{font-size:13px;color:#9a93a8;display:block;margin-bottom:4px}
  #promptWrap{flex:1 1 0;min-height:0;display:flex;flex-direction:column}
  #prompt{flex:1;width:100%;resize:none;background:#120f18;color:#e2e8d0;border:1px solid #3a3450;border-radius:6px;padding:8px;font:15px/1.5 system-ui,sans-serif}
  #noteWrap{flex:0 0 auto}
  #note{width:100%;height:96px;resize:vertical;background:#120f18;color:#e8e4ee;border:1px solid #3a3450;border-radius:6px;padding:8px;font:15px system-ui}
  #colImgNote{flex:0 0 460px;display:flex;flex-direction:column;gap:5px;min-height:0}
  #colImgNote > label{font-size:13px;color:#9a93a8}
  #colImgNote .resolve{float:right;font-size:13px;color:#cbbf9a;cursor:pointer}
  #imgDel{float:right;margin-left:10px;font:12px system-ui;padding:1px 7px;border:1px solid #7a4444;border-radius:5px;background:#3a2020;color:#e6b0b0;cursor:pointer}
  #imgDel:disabled{opacity:.4;cursor:default}
  #imgnote{flex:1;min-height:0;width:100%;resize:none;background:#120f18;color:#e8e4ee;border:1px solid #3a3450;border-radius:6px;padding:8px;font:15px system-ui}
  #imgnote:disabled{opacity:.45}
  #actualPrompt{flex:3;min-height:0;width:100%;resize:none;background:#0e0c14;color:#b8c0a8;border:1px solid #2a2536;border-radius:6px;padding:8px;font:12px/1.5 ui-monospace,monospace;white-space:pre-wrap}
  #hint{position:fixed;left:14px;bottom:10px;color:#cfc8da;background:rgba(0,0,0,.45);padding:4px 9px;border-radius:5px;font-size:11px;pointer-events:none;z-index:4}
  #pick{position:fixed;right:14px;bottom:14px;width:264px;background:rgba(20,17,26,.95);border:1px solid #4a4458;border-radius:8px;padding:9px 12px;z-index:6;display:none}
  #pick h4{margin:0 0 6px;font-size:14px;color:#f0d9a0;padding-right:16px}
  #pick .row{font-size:12px;color:#d2ccde;margin:3px 0;line-height:1.4;word-break:break-word}
  #pick .k{display:inline-block;min-width:46px;color:#9a93a8}
  #pick .close{position:absolute;top:6px;right:9px;cursor:pointer;color:#9a93a8;font-size:15px;line-height:1}
  #pick .close:hover{color:#fff}
  #pick .ed{margin:4px 0;display:flex;align-items:center;gap:4px}
  #pick .ed label{min-width:46px;color:#9a93a8;font-size:11px}
  #pick input,#pick select{background:#120f18;color:#e8e4ee;border:1px solid #3a3450;border-radius:4px;padding:2px 4px;font:12px system-ui}
  #pick input[type=number]{width:52px}
  #pick .btns{margin-top:8px;display:flex;gap:6px}
  #pick .btns button{font:12px system-ui;padding:3px 9px;border:1px solid #4a4458;border-radius:5px;background:#241f30;color:#e8e4ee;cursor:pointer}
  #pick #edSave{background:#3a6ea5;border-color:#5a8ec5;color:#fff;font-weight:600}
  #pick #edDel{background:#5a2a2a;border-color:#7a4444;margin-left:auto}
  #pick .edmsg{font-size:11px;color:#bdb4c8;margin-top:5px;min-height:13px}
  #pick .tbtns{display:flex;gap:4px}
  #pick .tbtn{font:11px system-ui;padding:2px 7px;border:1px solid #4a4458;border-radius:5px;background:#241f30;color:#cfc8da;cursor:pointer}
  #pick .tbtn.on{background:#3a3450;color:#fff;border-color:#6a5}
  #err{position:fixed;inset:48px 0 0 0;display:none;place-items:center;color:#f88;background:#2a1416;font-size:15px;padding:30px;text-align:center;z-index:9}
</style>
</head>
<body>
<div id="bar">
  <span id="views"></span>
  <button id="upd" title="Save the current camera as this room’s vantage" style="display:none">✓ Update vantage</button>
  <button id="addblk" title="Drop a 1×1×1 block in front of the camera, then edit it" style="display:none">➕ Add block</button>
  <span class="spacer"></span>
  <select id="model" title="Generator model">
    <option value="openai-low">OpenAI · low (~$0.006)</option>
    <option value="openai-medium">OpenAI · medium (~$0.05)</option>
    <option value="gemini">Gemini (~$0.04)</option>
    <option value="gemini-pro">Nano Banana Pro (~$0.13)</option>
  </select>
  <button id="gen" title="Render this vantage and style it through the model">✨ Generate</button>
  <button id="openloc" title="Open this room’s location page in artview" style="display:none">↗ Location</button>
  <span id="msg"></span>
</div>
<div id="cols">
  <div id="colText">
    <div id="desc" class="panel"><h3 id="descName">—</h3><div class="prose" id="descProse">(canon room description)</div></div>
    <div id="promptWrap"><label>Scene — the scene layer (artist &amp; mood added automatically)</label><textarea id="prompt" spellcheck="false"></textarea></div>
    <div id="noteWrap"><label>Notes for this vantage — appended to every render</label><textarea id="note" placeholder="e.g. warmer light; curtain half-open"></textarea></div>
  </div>
  <div id="colView"><div id="viewport"><canvas id="c" width="768" height="1024"></canvas></div></div>
  <div id="colResult">
    <div id="result"><div id="resultCap" style="display:none"></div><div class="ph">Pick a vantage, frame it, then <b>Generate</b>.<br>Selecting a vantage shows its latest shot.</div></div>
    <div id="gallery"></div>
  </div>
  <div id="colImgNote">
    <label>Note on the selected shot <button id="imgDel" title="Permanently delete the selected shot" disabled>🗑 Delete</button><label class="resolve"><input type="checkbox" id="imgResolve"> Resolve</label></label>
    <textarea id="imgnote" placeholder="What you think of THIS shot (saved to review-notes)"></textarea>
    <label>Actual prompt sent to the model</label>
    <textarea id="actualPrompt" readonly placeholder="(generate a shot to see its prompt)"></textarea>
  </div>
</div>
<div id="hint"><b>left-click</b> inspect · <b>right-drag</b> look · <b>WASD</b> move (W follows your look) · <b>Space/E</b> up · <b>Q</b> down · <b>Shift</b> fast · <b>scroll</b> fwd/back</div>
<div id="pick"><span class="close" id="pickClose" title="Deselect">✕</span><h4 id="pickName">—</h4><div id="pickBody"></div></div>
<div id="err"></div>
<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/TransformControls.js"></script>
<!-- Postprocessing for SSAO (contact-shadow seams where blocks meet). Order matters. -->
<script src="https://unpkg.com/three@0.128.0/examples/js/math/SimplexNoise.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/shaders/SSAOShader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/shaders/DepthLimitedBlurShader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/shaders/UnpackDepthRGBAShader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/Pass.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/MaskPass.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/SSAOPass.js"></script>
<script>
// Generic blockout renderer + clay→image generator + per-volume gallery/notes/prompt.
// Shell parts (walls/ceiling) auto-hide when the camera leaves the volume → "look in" from
// outside, walls intact from interior vantages. See .tome/blockout-3d-continuity.md.
const params = new URLSearchParams(location.search);
const lock = params.get('lock') === '1';
const startView = params.get('view') || null;
const G = params.get('game'), VOL = params.get('volume');
const srcUrl = params.get('src') || (G && VOL ? `/games/images/${G}/_blockout/${VOL}.scene.json` : null);
const liveTool = !!(G && VOL);

const CW = 768, CH = 1024;
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, CW / CH, 0.1, 500);
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, preserveDrawingBuffer: true });
renderer.setSize(CW, CH, false);
renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;

// --- SSAO postprocessing: contact-shadow seams where two blocks meet -----------------
// (gives the block-intersection lines EdgesGeometry can't). Falls back to plain render if
// the postprocessing modules failed to load, so a CDN miss can never break the viewer.
let composer = null, ssaoPass = null;
function ensureComposer(w, h) {
  if (composer || !(THREE.EffectComposer && THREE.SSAOPass && THREE.RenderPass)) return;
  try {
    composer = new THREE.EffectComposer(renderer);
    composer.addPass(new THREE.RenderPass(scene, camera));
    ssaoPass = new THREE.SSAOPass(scene, camera, w, h);
    ssaoPass.kernelRadius = 8; ssaoPass.minDistance = 0.002; ssaoPass.maxDistance = 0.12;
    composer.addPass(ssaoPass);
  } catch (e) { composer = null; ssaoPass = null; console.warn('SSAO unavailable:', e.message); }
}
function renderFrame() { if (composer) composer.render(); else renderer.render(scene, camera); }

const clay = (hex) => new THREE.MeshStandardMaterial({ color: new THREE.Color(hex || '#b0b0b0'), roughness: 0.96, metalness: 0 });
// Semantic colour-coding so the blockout reads as a segmentation map (model + human can tell
// stage from seats from boxes). MUST match ROLE_LEGEND in review-server.cjs.
const ROLE_COLORS = { stage: '#c9a86a', seat: '#8c3a3a', wall: '#9aa0aa', ceiling: '#c2c2c2', balcony: '#6a5a8a', pit: '#5a4a3a', door: '#6f6f40', curtain: '#7a2030', chandelier: '#d9cf9a', rail: '#a87b3a', brick: '#9c5440', hole: '#161318', floor: '#9c9c9c' };
const roleColor = (p, inherit) => ROLE_COLORS[p.role || inherit] || p.color;
const setMsg = (t) => { document.getElementById('msg').textContent = t || ''; };
const imgUrl = (file) => `/img/blockout?game=${encodeURIComponent(G)}&volume=${encodeURIComponent(VOL)}&f=${encodeURIComponent(file)}`;
function fail(msg) { const e = document.getElementById('err'); e.style.display = 'grid'; e.textContent = msg; console.error(msg); }

function mesh(geom, at, color, tag) {
  const m = new THREE.Mesh(geom, clay(color));
  if (at) m.position.set(at[0], at[1], at[2]);
  m.castShadow = true; m.receiveShadow = true;
  if (tag) m.userData.part = tag;   // source scene-def part, for click-to-inspect
  // Dark edge lines so corners read clearly (cel-shaded look) — helps the human and the model see structure.
  m.add(new THREE.LineSegments(new THREE.EdgesGeometry(geom, 20), new THREE.LineBasicMaterial({ color: 0x141414 })));
  return m;
}
const deg = (d) => d * Math.PI / 180, rdeg = (r) => +(r * 180 / Math.PI).toFixed(1), r3 = (n) => +n.toFixed(3);
// Orient a mesh: an explicit `rot` (euler degrees) wins; otherwise a cyl falls back to its `axis`.
// Once a part is rotated via the gizmo, `rot` captures its full orientation (incl. any axis base).
function orient(m, p) {
  m.rotation.set(0, 0, 0);
  if (p.rot) m.rotation.set(deg(p.rot[0]), deg(p.rot[1]), deg(p.rot[2]));
  else if (p.cyl) { const c = p.cyl; if (c.axis === 'x') { m.rotation.z = Math.PI / 2; if (c.half) m.rotation.y = Math.PI; } else if (c.axis === 'z') m.rotation.x = Math.PI / 2; }
}
function buildPart(p, parent, offset, inherit, tagPart) {
  const off = offset || [0, 0, 0];
  const at = p.at ? [p.at[0] + off[0], p.at[1] + off[1], p.at[2] + off[2]] : off.slice();
  const col = roleColor(p, inherit);
  const tag = tagPart || p;   // grid sub-parts inherit the top grid part as their inspect tag
  if (p.box) { const m = mesh(new THREE.BoxGeometry(p.box[0], p.box[1], p.box[2]), at, col, tag); orient(m, p); parent.add(m); }
  else if (p.sphere) { const m = mesh(new THREE.IcosahedronGeometry(p.sphere, 1), at, col, tag); orient(m, p); parent.add(m); }
  else if (p.cyl) {
    const c = p.cyl, m = mesh(new THREE.CylinderGeometry(c.r, c.r, c.len, 16, 1, false, 0, c.half ? Math.PI : Math.PI * 2), at, col, tag);
    orient(m, p); parent.add(m);
  } else if (p.grid) {
    const g = p.grid, [x0, x1, dx] = g.x, [z0, z1, dz] = g.z; let row = 0;
    for (let z = z0; z <= z1 + 1e-6; z += dz, row++) { const lift = (g.rakePerRow || 0) * row;
      for (let x = x0; x <= x1 + 1e-6; x += dx) for (const sub of (p.of || [])) buildPart(sub, parent, [x, lift, z], p.role, tag); }
  }
}

// --- Click-to-inspect: raycast a block, highlight it, show its scene-def facts ----------
const raycaster = new THREE.Raycaster();
let pickedMesh = null, pickedEmissive = 0;
function clearPick() {
  if (pickedMesh && pickedMesh.material) pickedMesh.material.emissive.setHex(pickedEmissive);
  pickedMesh = null; detachGizmo(); document.getElementById('pick').style.display = 'none';
}
function highlight(m) {
  if (pickedMesh === m) return;
  if (pickedMesh && pickedMesh.material) pickedMesh.material.emissive.setHex(pickedEmissive);
  pickedMesh = m; pickedEmissive = m.material.emissive.getHex(); m.material.emissive.setHex(0x2c5a2c);
}
async function post(url, b) { try { return await (await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(b) })).json(); } catch (e) { return { ok: false, error: e.message }; } }
const $ = (id) => document.getElementById(id);
const num = (id) => { const v = parseFloat($(id).value); return isNaN(v) ? 0 : +v.toFixed(3); };
function existingNames() { const s = new Set(); scene.traverse((o) => { if (o.userData.part) s.add(o.userData.part.name); }); return s; }
function findMeshFor(part) { let f = null; scene.traverse((o) => { if (o.userData.part === part) f = o; }); return f; }

// Swap a live mesh's geometry (+ its edge-line child) to match an edited part's size.
function setGeometry(m, p) {
  let geom = null;
  if (p.box) geom = new THREE.BoxGeometry(p.box[0], p.box[1], p.box[2]);
  else if (p.sphere != null) geom = new THREE.IcosahedronGeometry(p.sphere, 1);
  else if (p.cyl) geom = new THREE.CylinderGeometry(p.cyl.r, p.cyl.r, p.cyl.len, 16, 1, false, 0, p.cyl.half ? Math.PI : Math.PI * 2);
  if (!geom) return;
  m.geometry.dispose(); m.geometry = geom;
  const edge = m.children.find((c) => c.isLineSegments);
  if (edge) { edge.geometry.dispose(); edge.geometry = new THREE.EdgesGeometry(geom, 20); }
}
// Re-skin a live mesh fully from an edited part (geometry, position, rotation, role-colour).
// Resets scale to 1 — size lives in the geometry, never in mesh.scale (the gizmo's scale is baked).
function applyPartToMesh(m, p) {
  setGeometry(m, p);
  m.scale.set(1, 1, 1);
  if (p.at) m.position.set(p.at[0], p.at[1], p.at[2]);
  orient(m, p);
  m.material.color.set(roleColor(p, null) || '#b0b0b0');
}

let selPart = null, selName = null, editMesh = null;
function edMsg(t) { const e = $('edMsg'); if (e) e.textContent = t || ''; }
// Read the editor inputs back into a fresh part object (preserving non-edited keys like shell/half/axis).
function readEditor() {
  const p = Object.assign({}, selPart);
  p.name = $('ed_name').value.trim();
  const role = $('ed_role').value; if (role) p.role = role; else delete p.role;
  const det = $('ed_detail').value.trim(); if (det) p.detail = det; else delete p.detail;
  p.at = [num('ed_x'), num('ed_y'), num('ed_z')];
  if (selPart.box) p.box = [num('ed_w'), num('ed_h'), num('ed_d')];
  else if (selPart.sphere != null) p.sphere = num('ed_r');
  else if (selPart.cyl) p.cyl = Object.assign({}, selPart.cyl, { r: num('ed_cr'), len: num('ed_cl') });
  const rx = num('ed_rx'), ry = num('ed_ry'), rz = num('ed_rz');
  if (rx || ry || rz) p.rot = [rx, ry, rz]; else delete p.rot;
  return p;
}
function onEdit() { selPart = readEditor(); applyPartToMesh(editMesh, selPart); editMesh.userData.part = selPart; $('pickName').textContent = selPart.name || '(unnamed)'; }

// --- 3D transform gizmo (TransformControls): Move / Scale / Rotate -----------------------
let gizmo = null, gmode = 'translate';
function ensureGizmo() {
  if (gizmo || !THREE.TransformControls) return;
  gizmo = new THREE.TransformControls(camera, renderer.domElement);
  gizmo.setSize(0.8);
  gizmo.addEventListener('objectChange', liveFields);            // live, during drag
  gizmo.addEventListener('dragging-changed', (e) => { if (!e.value) syncFromMesh(); });   // bake on drag end
  scene.add(gizmo);
}
function attachGizmo(m) { ensureGizmo(); if (!gizmo) return; gizmo.attach(m); gizmo.setMode(gmode); gizmo.visible = true; }
function detachGizmo() { if (gizmo) { gizmo.detach(); gizmo.visible = false; } }
function setMode(mode) { gmode = mode; if (gizmo) gizmo.setMode(mode); document.querySelectorAll('#pick .tbtn').forEach((b) => b.classList.toggle('on', b.dataset.m === mode)); }
// Live-update the panel fields while a gizmo drag is in progress (scale rides on mesh.scale until baked).
function liveFields() {
  const m = editMesh, p = selPart; if (!m || !p) return;
  if ($('ed_x')) { $('ed_x').value = r3(m.position.x); $('ed_y').value = r3(m.position.y); $('ed_z').value = r3(m.position.z); }
  if (p.box && $('ed_w')) { $('ed_w').value = r3(p.box[0] * m.scale.x); $('ed_h').value = r3(p.box[1] * m.scale.y); $('ed_d').value = r3(p.box[2] * m.scale.z); }
  else if (p.sphere != null && $('ed_r')) $('ed_r').value = r3(p.sphere * m.scale.x);
  else if (p.cyl && $('ed_cr')) { $('ed_cr').value = r3(p.cyl.r * m.scale.x); $('ed_cl').value = r3(p.cyl.len * m.scale.y); }
  if ($('ed_rx')) { $('ed_rx').value = rdeg(m.rotation.x); $('ed_ry').value = rdeg(m.rotation.y); $('ed_rz').value = rdeg(m.rotation.z); }
}
// On drag-end: bake mesh.scale into the geometry, read pos/rot off the mesh into selPart, refresh fields.
function syncFromMesh() {
  const m = editMesh, p = selPart; if (!m || !p) return;
  const s = m.scale;
  if (Math.abs(s.x - 1) > 1e-4 || Math.abs(s.y - 1) > 1e-4 || Math.abs(s.z - 1) > 1e-4) {
    if (p.box) selPart = Object.assign({}, p, { box: [r3(p.box[0] * s.x), r3(p.box[1] * s.y), r3(p.box[2] * s.z)] });
    else if (p.sphere != null) selPart = Object.assign({}, p, { sphere: r3(p.sphere * s.x) });

    await loadInfo(); await loadGallery();
    const u = document.getElementById('upd'); u.style.display = ''; u.onclick = () => updateVantage(u);
    const ab = document.getElementById('addblk'); ab.style.display = ''; ab.onclick = addBlock;
    const ol = document.getElementById('openloc'); ol.style.display = ''; ol.onclick = openLocation;
    document.getElementById('note').addEventListener('blur', saveNote);
    document.getElementById('imgnote').addEventListener('blur', saveImgNote);
    document.getElementById('imgResolve').addEventListener('change', toggleImgResolve);
    document.getElementById('imgDel').onclick = deleteImage;
  } else { document.getElementById('gen').disabled = true; setMsg('(standalone — open via artview to generate)'); }
  document.getElementById('gen').onclick = generate;

  document.getElementById('pickClose').onclick = clearPick;
  addEventListener('keydown', (e) => { if (e.key !== 'Escape') return; const a = document.activeElement; if (a && /INPUT|SELECT|TEXTAREA/.test(a.tagName)) a.blur(); clearPick(); });
  // 1/2/3 switch the gizmo between Move/Scale/Rotate while a movable block is selected.
  addEventListener('keydown', (e) => {
    const a = document.activeElement; if (a && /INPUT|SELECT|TEXTAREA/.test(a.tagName)) return;
    if (!gizmo || !gizmo.object) return;
    const mode = { Digit1: 'translate', Digit2: 'scale', Digit3: 'rotate' }[e.code];
    if (mode) { e.preventDefault(); setMode(mode); }
  });
  applyView(first); sizeToViewport(); addEventListener('resize', sizeToViewport);
  if (nav.file && GENS.some((x) => x.file === nav.file)) setResult(nav.file);   // re-show the last shot
  const move = installNav();
  (function loop() {
    requestAnimationFrame(loop); move();
    if (shellGroup && bounds) shellGroup.visible = bounds.containsPoint(camera.position);   // dollhouse from outside
    renderFrame();
  })();
  window.__ready = true;
}
boot();
</script>
</body>
</html>
